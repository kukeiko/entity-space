<p-table *ngIf="queries" [columns]="columns" [value]="queries" [reorderableColumns]="true">
    <ng-template pTemplate="header" let-columns>
        <tr>
            <th *ngFor="let column of columns" pReorderableColumn>
                {{ column.header }}
            </th>
        </tr>
    </ng-template>
    <ng-template pTemplate="body" let-query let-columns="columns">
        <tr>
            <td *ngFor="let column of columns" [ngSwitch]="column.field">
                <span *ngSwitchCase="'full'">{{ query.toString() }}</span>
                <span *ngSwitchDefault>{{ query[column.field] }}</span>
            </td>
        </tr>
    </ng-template>
</p-table>
