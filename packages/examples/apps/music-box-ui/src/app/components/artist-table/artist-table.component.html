<p-table *ngIf="state$ | async; let state" [columns]="columns" [value]="state.data.artists" [reorderableColumns]="true">
    <ng-template pTemplate="header" let-columns>
        <tr>
            <th *ngFor="let column of columns" pReorderableColumn>
                {{ column.header }}
            </th>
            <th></th>
        </tr>
    </ng-template>
    <ng-template pTemplate="body" let-artist let-columns="columns">
        <tr>
            <td *ngFor="let column of columns">
                <span>{{ artist[column.field] }}</span>
            </td>
            <td>
                <!-- <button
                    pButton
                    pRipple
                    type="button"
                    icon="pi pi-pencil"
                    class="p-button-rounded p-button-text"
                    (click)="editSong(song)"
                ></button> -->
            </td>
        </tr>
    </ng-template>
</p-table>
