<p-table *ngIf="state$ | async; let state" [columns]="columns" [value]="state.data.artists" [reorderableColumns]="true">
    <ng-template pTemplate="header" let-columns>
        <tr>
            <th *ngFor="let column of columns" pReorderableColumn>
                {{ column.header }}
            </th>
            <th>
                <button
                    pButton
                    pRipple
                    type="button"
                    icon="pi pi-plus"
                    class="p-button-rounded p-button-text"
                    (click)="create()"
                ></button>
            </th>
        </tr>
    </ng-template>
    <ng-template pTemplate="body" let-artist let-columns="columns">
        <tr>
            <td *ngFor="let column of columns">
                <span>{{ artist[column.field] }}</span>
            </td>
            <td>
                <button
                    pButton
                    pRipple
                    type="button"
                    icon="pi pi-pencil"
                    class="p-button-rounded p-button-text"
                    (click)="edit(artist)"
                ></button>
            </td>
        </tr>
    </ng-template>
</p-table>
<p-dialog *ngIf="editedEntity" [(visible)]="editDialogVisible" header="Edit Artist" styleClass="p-fluid">
    <ng-template pTemplate="content">
        <div class="field">
            <label for="name">Name</label>
            <input type="text" pInputText name="name" id="name" [(ngModel)]="editedEntity.name" required autofocus />
        </div>
    </ng-template>
    <ng-template pTemplate="footer">
        <button pButton label="Cancel" icon="pi pi-times" class="p-button-text" (click)="hideDialog()"></button>
        <button
            pButton
            label="Save"
            icon="pi pi-check"
            class="p-button-text p-button-success"
            (click)="saveSong()"
        ></button>
    </ng-template>
</p-dialog>
