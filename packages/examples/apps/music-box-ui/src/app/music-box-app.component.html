<p-tabView>
    <p-tabPanel header="Songs">
        <ng-template pTemplate="content">
            <song-filter-bar [(filter)]="filter"></song-filter-bar>
            <song-table [songs]="(songs$ | async) ?? []"></song-table>
        </ng-template>
    </p-tabPanel>
    <p-tabPanel header="Artists">
        <ng-template pTemplate="content">
            <artist-table [artists]="(artists$ | async) ?? []"></artist-table>
        </ng-template>
    </p-tabPanel>
    <p-tabPanel header="Cached Queries">
        <ng-template pTemplate="content">
            <query-cache-table [queries]="(cachedQueries$ | async) ?? []"></query-cache-table>
        </ng-template>
    </p-tabPanel>
</p-tabView>
