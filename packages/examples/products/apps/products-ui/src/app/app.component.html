<h1>hello!</h1>
<div>
    <input type="text" [(ngModel)]="minPrice" placeholder="min price" />
    <input type="text" [(ngModel)]="maxPrice" placeholder="max price" />
    <input type="text" [(ngModel)]="minRating" placeholder="min rating" />
    <input type="text" [(ngModel)]="maxRating" placeholder="max rating" />
    <button (click)="search()">Search</button>
</div>
<h2>Queries in workspace Cache:</h2>
<ul>
    <li *ngFor="let query of queriesInWorkspaceCache">
        {{ query.criteria }}
    </li>
</ul>
<h2>Queries issued against API:</h2>
<ol>
    <li *ngFor="let query of queriesIssuedAgainstApi">
        {{ query.criteria }}
    </li>
</ol>
<h2>Products:</h2>
<ul>
    <li *ngFor="let product of products">{{ product | json }}</li>
</ul>
